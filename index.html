<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Mapa de la Colonia</title>
<meta name="description" content="Mapa colaborativo de la colonia: ubicaciones, contactos y límite del área compartidos en tiempo real con tu equipo.">
<meta name="theme-color" content="#0b1220">
<meta property="og:title" content="Mapa de la Colonia">
<meta property="og:description" content="Ubicaciones y encargados por dirección, compartido en tiempo real.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b1220'/%3E%3Cpath d='M32 10c-9.4 0-17 7.6-17 17 0 12.7 17 27 17 27s17-14.3 17-27c0-9.4-7.6-17-17-17z' fill='%233fd0c9'/%3E%3Ccircle cx='32' cy='27' r='7' fill='%230b1220'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logos">
      <img src="assets/logo-caritas.png" alt="Cáritas de Nuevo Laredo A.C.">
      <img src="assets/logo-parroquia.png" alt="Parroquia San Antonio María Claret">
    </div>
  </div>
  <div class="admin-area" id="adminArea"></div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input id="searchInput" placeholder="Buscar una dirección o calle..." autocomplete="off">
    <div class="search-results" id="searchResults" style="display:none;"></div>
  </div>
  <span class="toolbar-divider" aria-hidden="true"></span>
  <button id="btnPeopleSearch"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>Buscar persona</button>
  <button class="primary" id="btnAddPin"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>Agregar ubicación</button>
  <button id="btnDrawBoundary" style="display:none;"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/></svg>Delimitar colonia</button>
  <button class="danger" id="btnDeleteBoundary" style="display:none;"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>Eliminar límite</button>
</div>
<div class="helper" id="helperText"></div>

<div id="map">
  <div class="map-loading" id="mapLoading"><div class="spinner"></div></div>
  <div class="legend">
    <div><span class="dot" style="background:var(--green);"></span> Ubicación registrada</div>
  </div>
  <div class="draw-controls" id="drawControls">
    <button class="ghost small" id="btnUndoPoint">Deshacer</button>
    <button class="primary small" id="btnFinishDraw">Finalizar área</button>
    <button class="ghost small" id="btnCancelDraw">Cancelar</button>
  </div>
</div>

<!-- Modal: agregar pin -->
<div class="overlay" id="pinOverlay">
  <div class="modal modal-wrap">
    <button class="close-x" data-close="pinOverlay">✕</button>
    <h2>Datos de la ubicación</h2>
    <p class="sub" id="pinAddressLabel">Dirección detectada...</p>
    <div class="field">
      <label>Tu nombre (quien registra) *</label>
      <input id="fieldSubidoPor" placeholder="Ej. Juan Ramos">
    </div>
    <div class="field">
      <label>Nombre del encargado *</label>
      <input id="fieldNombre" placeholder="Ej. María López">
    </div>
    <div class="field">
      <label>Teléfono</label>
      <input id="fieldTelefono" placeholder="Ej. 555 123 4567">
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input id="fieldEmail" type="email" placeholder="Ej. correo@ejemplo.com">
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea id="fieldNotas" rows="3" placeholder="Referencias, horarios, observaciones..."></textarea>
    </div>
    <div class="field">
      <label>Dirección</label>
      <input id="fieldDireccion" placeholder="Dirección">
    </div>
    <div class="modal-actions">
      <button class="ghost" data-close="pinOverlay">Cancelar</button>
      <button class="primary" id="btnSavePin">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: administrador -->
<div class="overlay" id="adminOverlay">
  <div class="modal modal-wrap">
    <button class="close-x" data-close="adminOverlay">✕</button>
    <h2 id="adminModalTitle">Modo administrador</h2>
    <p class="sub" id="adminModalSub">Ingresa el PIN de administrador.</p>
    <div class="field">
      <label id="pinLabel1">PIN</label>
      <input id="fieldPin1" type="text" inputmode="numeric" autocomplete="off" placeholder="••••">
    </div>
    <div class="field" id="pinConfirmWrap" style="display:none;">
      <label>Confirma el PIN</label>
      <input id="fieldPin2" type="text" inputmode="numeric" autocomplete="off" placeholder="••••">
    </div>
    <div class="modal-actions">
      <button class="ghost" data-close="adminOverlay">Cancelar</button>
      <button class="primary" id="btnAdminSubmit">Entrar</button>
    </div>
  </div>
</div>

<!-- Modal: buscar persona -->
<div class="overlay" id="peopleOverlay">
  <div class="modal modal-wrap">
    <button class="close-x" data-close="peopleOverlay">✕</button>
    <h2>Buscar persona</h2>
    <p class="sub">Selecciona un nombre para ir a su ubicación en el mapa.</p>
    <div class="pending-list" id="peopleList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
